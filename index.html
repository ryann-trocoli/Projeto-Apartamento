<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ============================================================
         SEO — título e descrição do imóvel
         ============================================================ -->
    <title>Apartamento à venda em Bananeiras-PB — 3 quartos, 111 m², vista para o vale | R$ 499.000</title>
    <meta
      name="description"
      content="Apartamento exclusivo com vista definitiva para o vale e a cidade de Bananeiras-PB. 111 m², 3 quartos (1 suíte), móveis projetados, piscina e área gourmet. Edifício com apenas 4 unidades. R$ 499.000."
    />

    <!-- ============================================================
         OPEN GRAPH / TWITTER CARD — para o link aparecer bonito
         quando compartilhado no WhatsApp, Facebook, Instagram etc.
         IMPORTANTE: troque "https://www.seudominio.com.br" pelo
         domínio real do site após o deploy (og:url e og:image
         precisam ser URLs absolutas).
         ============================================================ -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="Apartamento Mirante do Vale — Bananeiras-PB" />
    <meta property="og:title" content="Apartamento com vista definitiva para o vale — Bananeiras-PB" />
    <meta
      property="og:description"
      content="111 m², 3 quartos (1 suíte), móveis projetados, piscina e área gourmet. Edifício exclusivo com apenas 4 unidades. R$ 499.000."
    />
    <meta property="og:url" content="https://www.seudominio.com.br/" />
    <meta property="og:image" content="https://www.seudominio.com.br/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Apartamento com vista definitiva para o vale — Bananeiras-PB" />
    <meta
      name="twitter:description"
      content="111 m², 3 quartos (1 suíte), móveis projetados, piscina e área gourmet. R$ 499.000."
    />
    <meta name="twitter:image" content="https://www.seudominio.com.br/og-image.jpg" />

    <!-- ============================================================
         RASTREAMENTO (Meta Pixel + GTM/GA4)
         Os IDs são configurados em UM ÚNICO lugar:
         src/lib/tracking.js  →  constantes PIXEL_ID e GTM_ID.
         Os scripts são injetados automaticamente pelo app quando os
         IDs estiverem preenchidos. Nada precisa ser colado aqui.
         ============================================================ -->
  </head>
  <body>
    <!-- Meta Pixel — fallback para navegadores sem JavaScript.
         O script principal do Pixel é injetado por src/lib/tracking.js -->
    <noscript
      ><img
        height="1"
        width="1"
        style="display: none"
        src="https://www.facebook.com/tr?id=1354828640098844&ev=PageView&noscript=1"
    /></noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
